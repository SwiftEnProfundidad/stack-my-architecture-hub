<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stack My Architecture Cursos</title>
  <style>
    :root {
      --bg: #0a1326;
      --bg-elevated: rgba(15, 23, 42, 0.72);
      --border: rgba(148, 163, 184, 0.28);
      --text: #e5e7eb;
      --text-muted: #cbd5e1;
      --accent: #60a5fa;
      --accent-2: #22d3ee;
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: "Avenir Next", "SF Pro Display", "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(80% 60% at 85% 0%, rgba(14, 165, 233, 0.2) 0%, transparent 70%),
        radial-gradient(70% 50% at 0% 100%, rgba(96, 165, 250, 0.18) 0%, transparent 75%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 24px 16px 36px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elevated);
      backdrop-filter: blur(8px);
      padding: 20px;
      box-shadow: 0 20px 40px rgba(2, 6, 23, 0.35);
    }

    h1 {
      margin: 0 0 10px;
      line-height: 1.15;
      font-size: clamp(1.55rem, 4vw, 2.2rem);
      letter-spacing: 0.02em;
    }

    p.lead {
      margin: 0;
      color: var(--text-muted);
      font-size: clamp(0.96rem, 2.5vw, 1.05rem);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }

    a.btn {
      display: block;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      background: rgba(15, 23, 42, 0.76);
      font-weight: 700;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease, color 0.18s ease;
    }

    a.btn:hover {
      border-color: var(--accent);
      color: #dbeafe;
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(14, 165, 233, 0.16);
    }

    p.note {
      color: var(--text-muted);
      margin: 0;
      font-size: 0.92rem;
    }

    @media (min-width: 640px) {
      .wrap {
        padding: 44px 24px 48px;
      }

      .panel {
        padding: 30px;
      }

      .actions {
        flex-direction: row;
      }

      a.btn {
        flex: 1;
        text-align: center;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="panel">
      <h1>Stack My Architecture · Cursos</h1>
      <p class="lead">Accede a iOS, Android y IA + SDD desde un hub único optimizado para móvil y escritorio.</p>
      <div class="actions">
        <a class="btn" href="./ios/index.html">Abrir curso iOS</a>
        <a class="btn" href="./android/index.html">Abrir curso Android</a>
        <a class="btn" href="./sdd/index.html">Abrir curso IA + SDD</a>
        <a class="btn" href="./auth/index.html">Registro / Login</a>
      </div>
      <p class="note">Sin cuenta: progreso local por curso. Con login: progreso cloud por usuario.</p>
    </div>
  </main>
</body>

</html>
