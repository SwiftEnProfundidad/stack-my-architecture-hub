<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña · Stack My Architecture</title>
  <link rel="stylesheet" href="./auth.css" />
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="top">
        <img class="logo" src="../assets/brand/pumuki-logo-neon.png" alt="PUMUKI" loading="lazy" decoding="async" />
        <div>
          <h1>Recuperar contraseña</h1>
          <p class="lead">Solicita un enlace de recuperación para restablecer tu acceso.</p>
        </div>
      </div>

      <form id="recover-form" class="stack">
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div class="row">
          <button class="btn btn-primary" type="submit">Enviar enlace</button>
          <a class="btn" href="./login.html">Volver al login</a>
          <a class="btn" href="./index.html">Volver</a>
        </div>
      </form>

      <div id="msg"></div>
    </section>
  </main>

  <script src="../assets/auth-client.js"></script>
  <script>
    (function () {
      var form = document.getElementById('recover-form');
      var msg = document.getElementById('msg');

      function setMessage(text, type) {
        msg.textContent = text || '';
        msg.className = text ? 'msg ' + (type || 'ok') : '';
      }

      function normalizeBase(input) {
        var value = String(input || '').trim();
        if (!value) return '';
        try {
          var parsed = new URL(value);
          if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
          return parsed.origin;
        } catch (_error) {
          return '';
        }
      }

      function isLocalHost(hostname) {
        var host = String(hostname || '').trim().toLowerCase();
        return host === 'localhost' || host === '127.0.0.1' || host === '::1';
      }

      function resolveAuthBase() {
        var params = new URLSearchParams(window.location.search);
        var fromQuery = normalizeBase(params.get('authBase') || params.get('redirectBase') || '');
        if (fromQuery) return fromQuery;

        var fromWindow = normalizeBase(String(window.__SMA_AUTH_REDIRECT_BASE || ''));
        if (fromWindow) return fromWindow;

        var fromStorage = normalizeBase(localStorage.getItem('sma:auth:redirect-base:v1') || '');
        if (fromStorage) return fromStorage;

        if (isLocalHost(window.location.hostname)) return 'https://architecture-stack.vercel.app';
        return normalizeBase(window.location.origin) || 'https://architecture-stack.vercel.app';
      }

      function resolveRedirect() {
        return resolveAuthBase() + '/auth/login.html';
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        setMessage('', '');
        var email = form.email.value.trim();
        if (!email) {
          setMessage('Indica un email válido.', 'error');
          return;
        }

        try {
          await window.SMAAuth.recoverPassword({
            email: email,
            emailRedirectTo: resolveRedirect()
          });
          setMessage('Si la cuenta existe, hemos enviado el enlace de recuperación.', 'ok');
        } catch (error) {
          setMessage(error && error.message ? error.message : 'No se pudo solicitar la recuperación.', 'error');
        }
      });
    })();
  </script>
</body>

</html>
