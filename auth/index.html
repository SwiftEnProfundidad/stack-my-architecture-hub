<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acceso · Stack My Architecture</title>
  <link rel="stylesheet" href="./auth.css" />
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="top">
        <img class="logo" src="../assets/brand/pumuki-logo-neon.png" alt="PUMUKI" loading="lazy" decoding="async" />
        <div>
          <h1>Acceso de cuenta</h1>
          <p class="lead">Regístrate o inicia sesión para persistir progreso por usuario entre dispositivos.</p>
        </div>
      </div>

      <div class="row">
        <a id="auth-nav-register" class="btn btn-primary" href="./register.html">Crear cuenta</a>
        <a id="auth-nav-login" class="btn" href="./login.html">Iniciar sesión</a>
        <a id="auth-nav-recover" class="btn" href="./recover.html">Recuperar contraseña</a>
        <a id="auth-nav-home" class="btn" href="../index.html">Volver al hub</a>
      </div>

      <div id="session-state" class="state-box"></div>
      <div id="msg"></div>
    </section>
  </main>

  <script src="../assets/auth-client.js"></script>
  <script>
    (function () {
      var state = document.getElementById('session-state');
      var msg = document.getElementById('msg');
      var registerLink = document.getElementById('auth-nav-register');
      var loginLink = document.getElementById('auth-nav-login');
      var recoverLink = document.getElementById('auth-nav-recover');
      var homeLink = document.getElementById('auth-nav-home');

      function setMessage(text, type) {
        if (!text) {
          msg.textContent = '';
          msg.className = '';
          return;
        }
        msg.textContent = text;
        msg.className = 'msg ' + (type || 'ok');
      }

      function renderState() {
        var user = window.SMAAuth.getUser();
        var session = window.SMAAuth.getSession();
        if (!user || !session) {
          state.innerHTML = '<strong>Estado:</strong> sin sesión activa.';
          return;
        }
        state.innerHTML = '<strong>Sesión activa</strong><br><span class="muted">Usuario:</span> <code>' +
          escapeHtml(user.email || user.id) + '</code><br><span class="muted">ID:</span> <code>' +
          escapeHtml(user.id || '') + '</code>';
      }

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function sanitizeNextTarget(value) {
        var next = String(value || '').trim();
        if (!next) return '';
        if (next.charAt(0) !== '/') return '';
        if (next.indexOf('//') === 0) return '';
        if (next.indexOf('://') >= 0) return '';
        if (next.indexOf('\n') >= 0 || next.indexOf('\r') >= 0) return '';
        return next;
      }

      function readNextTarget() {
        var params = new URLSearchParams(window.location.search || '');
        return sanitizeNextTarget(params.get('next'));
      }

      function withNext(path, nextTarget) {
        if (!path || !nextTarget) return path;
        try {
          var target = new URL(path, window.location.href);
          target.searchParams.set('next', nextTarget);
          return target.pathname + target.search + target.hash;
        } catch (_error) {
          return path;
        }
      }

      function applyNavigationTargets() {
        var nextTarget = readNextTarget();
        if (registerLink) registerLink.href = withNext('./register.html', nextTarget);
        if (loginLink) loginLink.href = withNext('./login.html', nextTarget);
        if (recoverLink) recoverLink.href = withNext('./recover.html', nextTarget);
        if (homeLink && nextTarget) homeLink.href = nextTarget;
      }

      window.addEventListener('sma:auth-changed', renderState);
      renderState();
      applyNavigationTargets();

      window.SMAAuth.config()
        .then(function (cfg) {
          if (!cfg.enabled) {
            setMessage('Autenticación cloud no disponible en este entorno.', 'error');
            return;
          }
          setMessage('Autenticación lista. Puedes continuar con registro o login.', 'ok');
        })
        .catch(function (error) {
          setMessage(error && error.message ? error.message : 'No se pudo cargar configuración auth.', 'error');
        });
    })();
  </script>
</body>

</html>
