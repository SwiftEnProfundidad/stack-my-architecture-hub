<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro · Stack My Architecture</title>
  <link rel="stylesheet" href="./auth.css" />
</head>

<body>
  <main class="wrap">
    <section class="panel">
      <div class="top">
        <img class="logo" src="../assets/brand/pumuki-logo-neon.png" alt="PUMUKI" loading="lazy" decoding="async" />
        <div>
          <h1>Crear cuenta</h1>
          <p class="lead">Registro con email y contraseña. Confirmación de email soportada por Supabase Auth.</p>
        </div>
      </div>

      <form id="register-form" class="stack">
        <div>
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required />
        </div>
        <div>
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />
        </div>
        <div>
          <label for="password2">Repite contraseña</label>
          <input id="password2" name="password2" type="password" autocomplete="new-password" minlength="8" required />
        </div>
        <div class="row">
          <button class="btn btn-primary" type="submit">Crear cuenta</button>
          <a id="register-nav-login" class="btn" href="./login.html">Ya tengo cuenta</a>
          <a id="register-nav-index" class="btn" href="./index.html">Volver</a>
        </div>
      </form>

      <div class="row">
        <button id="resend-btn" class="btn" type="button" disabled>Reenviar confirmación</button>
      </div>

      <div id="msg"></div>
    </section>
  </main>

  <script src="../assets/auth-client.js"></script>
  <script>
    (function () {
      var form = document.getElementById('register-form');
      var resendBtn = document.getElementById('resend-btn');
      var msg = document.getElementById('msg');
      var pendingEmail = '';
      var loginLink = document.getElementById('register-nav-login');
      var indexLink = document.getElementById('register-nav-index');

      function setMessage(text, type) {
        msg.textContent = text || '';
        msg.className = text ? 'msg ' + (type || 'ok') : '';
      }

      function normalizeBase(input) {
        var value = String(input || '').trim();
        if (!value) return '';
        try {
          var parsed = new URL(value);
          if (parsed.protocol !== 'http:' && parsed.protocol !== 'https:') return '';
          return parsed.origin;
        } catch (_error) {
          return '';
        }
      }

      function isLocalHost(hostname) {
        var host = String(hostname || '').trim().toLowerCase();
        return host === 'localhost' || host === '127.0.0.1' || host === '::1';
      }

      function sanitizeNextTarget(value) {
        var next = String(value || '').trim();
        if (!next) return '';
        if (next.charAt(0) !== '/') return '';
        if (next.indexOf('//') === 0) return '';
        if (next.indexOf('://') >= 0) return '';
        if (next.indexOf('\n') >= 0 || next.indexOf('\r') >= 0) return '';
        return next;
      }

      function readNextTarget() {
        var params = new URLSearchParams(window.location.search || '');
        return sanitizeNextTarget(params.get('next'));
      }

      function withNext(path, nextTarget) {
        if (!path || !nextTarget) return path;
        try {
          var target = new URL(path, window.location.href);
          target.searchParams.set('next', nextTarget);
          return target.pathname + target.search + target.hash;
        } catch (_error) {
          return path;
        }
      }

      function applyNavigationTargets() {
        var nextTarget = readNextTarget();
        if (loginLink) loginLink.href = withNext('./login.html', nextTarget);
        if (indexLink) indexLink.href = withNext('./index.html', nextTarget);
      }

      function resolvePostLoginTarget() {
        return readNextTarget() || '../index.html';
      }

      function resolveAuthBase() {
        var params = new URLSearchParams(window.location.search);
        var fromQuery = normalizeBase(params.get('authBase') || params.get('redirectBase') || '');
        if (fromQuery) return fromQuery;

        var fromWindow = normalizeBase(String(window.__SMA_AUTH_REDIRECT_BASE || ''));
        if (fromWindow) return fromWindow;

        var fromStorage = normalizeBase(localStorage.getItem('sma:auth:redirect-base:v1') || '');
        if (fromStorage) return fromStorage;

        if (isLocalHost(window.location.hostname)) return 'https://architecture-stack.vercel.app';
        return normalizeBase(window.location.origin) || 'https://architecture-stack.vercel.app';
      }

      function resolveRedirect() {
        var nextTarget = readNextTarget();
        var target = resolveAuthBase() + '/auth/login.html';
        if (!nextTarget) return target;
        return target + '?next=' + encodeURIComponent(nextTarget);
      }

      form.addEventListener('submit', async function (event) {
        event.preventDefault();
        setMessage('', '');
        var email = form.email.value.trim();
        var password = form.password.value;
        var password2 = form.password2.value;

        if (!email || !password) {
          setMessage('Completa email y contraseña.', 'error');
          return;
        }
        if (password !== password2) {
          setMessage('Las contraseñas no coinciden.', 'error');
          return;
        }

        try {
          var result = await window.SMAAuth.signup({
            email: email,
            password: password,
            emailRedirectTo: resolveRedirect()
          });

          if (result.requiresEmailConfirmation) {
            pendingEmail = email;
            resendBtn.disabled = false;
            setMessage('Cuenta creada. Revisa tu email para confirmar antes de iniciar sesión.', 'ok');
            return;
          }

          setMessage('Registro completado y sesión iniciada. Redirigiendo...', 'ok');
          setTimeout(function () {
            window.location.href = resolvePostLoginTarget();
          }, 600);
        } catch (error) {
          setMessage(error && error.message ? error.message : 'No se pudo completar el registro.', 'error');
        }
      });

      resendBtn.addEventListener('click', async function () {
        setMessage('', '');
        var email = pendingEmail || form.email.value.trim();
        if (!email) {
          setMessage('Indica un email válido para reenviar la confirmación.', 'error');
          return;
        }
        try {
          await window.SMAAuth.resendConfirmation({
            email: email,
            emailRedirectTo: resolveRedirect()
          });
          setMessage('Email de confirmación reenviado. Revisa tu bandeja.', 'ok');
        } catch (error) {
          setMessage(error && error.message ? error.message : 'No se pudo reenviar la confirmación.', 'error');
        }
      });

      applyNavigationTargets();
    })();
  </script>
</body>

</html>
